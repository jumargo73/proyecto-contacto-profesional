<section class="register-container">
  <div class="card-tech">
    <div class="text-center mb-4">
    <h2>Crear Cuenta</h2>
    <p>Únete a Tech Plataforma</p>
    </div>
    <div class="container" *ngIf="registerForm">
        <form [formGroup]="registerForm" (submit)="onRegister()">
        <div class="form-group">
            <input type="text" formControlName="name" class="form-control-tech" placeholder="Nombre completo" required>
        </div>

        <div class="form-group">
            <input type="email" formControlName="email" class="form-control-tech" placeholder="name@example.com" required>
        </div>

        <div class="form-group">
            <input type="password" formControlName="password" class="form-control-tech" placeholder="Contraseña" required>
        </div>

        <button type="submit" class="btn-tech">Registrarse</button>
        
        <p class="auth-footer">
            ¿Ya tienes cuenta? <a routerLink="/login">Inicia Sesión</a>
        </p>
        </form>
    </div>
  </div>
</section>
