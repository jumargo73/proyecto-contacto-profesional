<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">

  <!-- 1. Izquierda: Abre el Sidebar (Menús) -->
  <button class="navbar-toggler d-lg-none" (click)="toggleSidebar()">
    ☰
  </button>

  <!-- Izquierda: Logo -->
  <a class="navbar-brand" href="#">Mi Dashboard</a>

 
  <!-- Reemplaza el 'collapse' por un dropdown simple -->
  <div class="ms-auto dropdown" *ngIf="isApiOk$ | async">
    <div (click)="toggleMenu()" class="d-flex align-items-center cursor-pointer text-white">
      <div class="user-info-text text-end me-2 d-none d-sm-block">
        <small class="d-block opacity-75">Bienvenido,</small>
        <strong class="d-block" style="font-size: 0.8rem;">{{ userName$ | async }}</strong>
      </div>
      <span class="btn btn-primary btn-sm rounded-circle d-flex align-items-center justify-content-center" 
            style="width: 35px; height: 35px;">
        <i class="bi bi-person-fill"></i> <!-- Si usas Bootstrap Icons -->
        👤
      </span>
    </div>

    <!-- El menú que aparece al hacer clic -->
    <div class="dropdown-menu dropdown-menu-end shadow p-3" [class.show]="isMenuOpen" 
        style="position: absolute; right: 0; top: 100%;">
      <div class="d-block d-sm-none mb-2">
        <strong class="d-block text-truncate" style="max-width: 120px; font-size: 0.8rem;">
          {{ userName$ | async }}
        </strong>
      </div>
      <span class="text-success d-block mb-2" style="font-size: 0.8rem;">● Conectado</span>
      <button class="btn btn-danger btn-sm w-100" (click)="logout()">Cerrar Sesión</button>
    </div>
  </div>
</nav>
