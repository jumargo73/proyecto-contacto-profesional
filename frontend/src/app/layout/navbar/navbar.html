<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
  <!-- Izquierda: Logo -->
  <a class="navbar-brand" href="#">Mi Dashboard</a>

  <!-- Botón Hamburguesa (solo visible en móvil) -->
   <button class="navbar-toggler" (click)="toggleMenu()" style="color: white; border: 1px solid #444; background: transparent; padding: 5px 10px;">
    ☰
  </button>

  <!-- Contenido colapsable -->
  <div class="collapse navbar-collapse" [class.show]="isMenuOpen" id="navbarContent">
    <div class="auth-group ms-auto d-flex flex-column flex-lg-row align-items-lg-center" *ngIf="isApiOk$ | async">
      
      <!-- Info de Usuario -->
      <div class="user-info-text text-white text-lg-end me-lg-3 my-2 my-lg-0">
        <small class="d-block opacity-75">Bienvenido,</small>
        <strong class="d-block">{{ userName$ | async }}</strong>
      </div>

      <!-- Estado -->
      <div class="status-wrapper me-lg-3 my-2 my-lg-0">
        <span style="color: #28a745;">● Conectado</span>
      </div>
        
      <!-- Botón -->
      <button class="btn btn-danger btn-sm" (click)="logout()">
        Cerrar Sesión
      </button>

    </div>
  </div>
</nav>
