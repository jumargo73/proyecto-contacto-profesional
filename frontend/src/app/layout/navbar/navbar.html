<nav class="custom-navbar">
  <!-- Izquierda: Hamburguesa y Logo -->
  <div class="nav-brand-group">
    <button class="menu-toggle-btn" (click)="toggleSidebar()">☰</button>
    <a class="brand-text" href="#">Mi Dashboard</a>
  </div>

  <!-- Derecha: Perfil -->
  <div class="user-profile-group" *ngIf="isApiOk$ | async">
    <div (click)="toggleMenu()" class="profile-trigger">
      
      <!-- El nombre solo existe en pantallas grandes -->
      <div class="user-name-wrapper">
        <span class="welcome-label">Bienvenido,</span>
        <span class="user-full-name">{{ userName$ | async }}</span>
      </div>

      <!-- El Avatar (Botón circular) -->
      <div class="avatar-circle-btn">
        👤
      </div>
    </div>

    <!-- Menú Desplegable -->
    <div class="profile-dropdown-menu" [class.is-open]="isMenuOpen" *ngIf="isMenuOpen">
      <div class="mobile-user-info">
        <strong>{{ userName$ | async }}</strong>
        <span class="status-online">● En línea</span>
      </div>
      <button class="logout-btn" (click)="logout()">Cerrar Sesión</button>
    </div>
  </div>
</nav>
