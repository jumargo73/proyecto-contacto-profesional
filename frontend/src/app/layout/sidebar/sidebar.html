<!-- Sidebar Contenedor -->
<div 
  *ngIf="isOpen$ | async" 
  (click)="toggleSidebar()" 
  class="fixed inset-0 z-40 bg-black/50 md:hidden transition-opacity">
</div>
<aside 
    [class.translate-x-0]="isOpen$ | async"
    [class.-translate-x-full]="!(isOpen$ | async)"
    class="fixed inset-y-0 left-0 z-50 w-64 bg-gray-900 transition-transform duration-300 transform md:relative md:block md:translate-x-0">
    
    <!-- Logo o Nombre de la App -->
    <div class="flex items-center px-2">
        <div class="w-8 h-8 bg-cyan-500 rounded-lg flex items-center justify-center">
            <span class="text-white font-bold">S</span>
        </div>
        <span class="mx-3 text-xl font-semibold text-white">ServiceApp</span>
    </div>

    <!-- Navegación -->
    <div class="flex flex-col justify-between flex-1 mt-10">
        <nav class="space-y-2">
            
            <!-- Dashboard -->
           <a [routerLink]="['/dashboard']"
                [routerLinkActiveOptions]="{exact: true}"
                routerLinkActive="bg-gray-800 text-cyan-400"
                class="flex items-center px-3 py-2 text-gray-300 transition-colors duration-300 transform rounded-lg hover:bg-gray-800 hover:text-cyan-400 group cursor-pointer">
                    
                    <svg xmlns="http://w3.org" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                    
                    <span class="mx-2 font-medium">Dashboard</span>
            </a>

            <!-- Servicios (Activo) -->
            <a [routerLink]="['/dashboard/services_list']"
                [routerLinkActiveOptions]="{exact: true}"
                routerLinkActive="bg-gray-800 text-cyan-400"
                class="flex items-center px-3 py-2 text-gray-300 transition-colors duration-300 transform rounded-lg hover:bg-gray-800 hover:text-cyan-400 group cursor-pointer">
                    
                    <svg xmlns="http://w3.org" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                    
                    <span class="mx-2 font-medium">Servicios</span>
            </a> 
            
            <!-- Configuración -->
            <a [routerLink]="['/dashboard/Configuración']"
                [routerLinkActiveOptions]="{exact: true}"
                routerLinkActive="bg-gray-800 text-cyan-400"
                class="flex items-center px-3 py-2 text-gray-300 transition-colors duration-300 transform rounded-lg hover:bg-gray-800 hover:text-cyan-400 group cursor-pointer">
                    
                    <svg xmlns="http://w3.org" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                    
                    <span class="mx-2 font-medium">Configuración</span>
            </a> 
        </nav>

        <!-- Botón de Salida -->
       <div class="mt-auto">
            <button 
                type="button"
                (click)="onLogout()" 
                class="flex items-center w-full px-3 py-2 text-gray-400 transition-colors duration-300 transform rounded-lg hover:bg-red-900/30 hover:text-red-400 group">
                <svg xmlns="http://w3.org" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                <span class="mx-2 font-medium">Cerrar Sesión</span>
            </button>
        </div>
    </div>
</aside>
