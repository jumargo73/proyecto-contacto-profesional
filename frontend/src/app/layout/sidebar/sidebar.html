<!-- Sidebar Contenedor -->

<aside class="sidebar">    
    <!-- Logo o Nombre de la App -->
    <div class="flex items-center px-4 py-3">
        <!-- Contenedor del Icono (Cuadro Cian) -->
        <div class="w-10 h-10 bg-cyan-500 rounded-xl flex items-center justify-center shadow-lg shadow-cyan-500/20">
            <img src="/logos/logo.png" 
                alt="Logo" 
                class="h-7 w-7 object-contain brightness-110 contrast-125">
        </div>

        <!-- Texto del Logo -->
        <span class="ml-3 text-xl font-bold text-white tracking-tight">
            JMG Digital
        </span>
    </div>

    <!-- Navegación -->
    <div class="flex flex-col justify-between flex-1 mt-10 p-4">
        <nav class="space-y-2">
            
            <!-- Dashboard -->
           <a [routerLink]="['/dashboard']"
                [routerLinkActiveOptions]="{exact: true}"
                routerLinkActive="bg-gray-800 text-cyan-400"
                class="flex items-center px-3 py-2 text-gray-300 transition-colors duration-300 transform rounded-lg hover:bg-gray-800 hover:text-cyan-400 group cursor-pointer">
                    
                    <svg xmlns="http://w3.org" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                    
                    <span class="mx-2 font-medium">Dashboard</span>
            </a>

            <!-- Servicios (Activo) -->
            <a [routerLink]="['/dashboard/services_list']"
                [routerLinkActiveOptions]="{exact: true}"
                routerLinkActive="bg-gray-800 text-cyan-400"
                class="flex items-center px-3 py-2 text-gray-300 transition-colors duration-300 transform rounded-lg hover:bg-gray-800 hover:text-cyan-400 group cursor-pointer">
                    
                    <svg xmlns="http://w3.org" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                    
                    <span class="mx-2 font-medium">Servicios</span>
            </a> 
            
            <!-- Configuración -->
            <a [routerLink]="['/dashboard/Configuración']"
                [routerLinkActiveOptions]="{exact: true}"
                routerLinkActive="bg-gray-800 text-cyan-400"
                class="flex items-center px-3 py-2 text-gray-300 transition-colors duration-300 transform rounded-lg hover:bg-gray-800 hover:text-cyan-400 group cursor-pointer">
                    
                    <svg xmlns="http://w3.org" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                    
                    <span class="mx-2 font-medium">Configuración</span>
            </a> 
        </nav>

        <!-- Botón de Salida -->
       <div class="mt-auto">
            <button 
                type="button"
                (click)="onLogout()" 
                class="flex items-center w-full px-3 py-2 text-gray-400 transition-colors duration-300 transform rounded-lg hover:bg-red-900/30 hover:text-red-400 group">
                <svg xmlns="http://w3.org" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                <span class="mx-2 font-medium">Cerrar Sesión</span>
            </button>
        </div>
    </div>
</aside>
