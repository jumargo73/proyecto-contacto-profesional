<form [formGroup]="contactoForm" (ngSubmit)="enviar()">
  <input formControlName="name" placeholder="Nombre">
  <input formControlName="email" placeholder="Email">
  <textarea formControlName="message" placeholder="Tu mensaje"></textarea>
  <button type="submit" [disabled]="contactoForm.invalid">Enviar</button>
</form>

<!-- Solo mostramos la tabla si hay contactos -->
<div *ngIf="contactos.length > 0; else listaVacia">
  <h3>Lista de Contactos (Desde Prisma)</h3>
  
  <table border="1" style="width: 100%; border-collapse: collapse; margin-top: 10px;">
    <thead>
      <tr style="background-color: #f2f2f2;">
        <th>Nombre</th>
        <th>Email</th>
        <th>Mensaje</th>
      </tr>
    </thead>
    <tbody>
      <!-- Aquí ocurre la magia: recorremos el array -->
      <tr *ngFor="let item of contactos()">
        <td>{{ item.name }}</td>
        <td>{{ item.email }}</td>
        <td>{{ item.message }}</td>
      </tr>
    </tbody>
  </table>
</div>

<!-- Si la base de datos está vacía, mostramos esto -->
<ng-template #listaVacia>
  <p style="color: gray;">No hay contactos en la base de datos.</p>
</ng-template>
