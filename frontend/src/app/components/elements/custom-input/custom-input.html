<div class="flex flex-col gap-1.5 w-full">
  <!-- Label -->
  <label *ngIf="label" class="text-sm font-medium text-gray-700">
    {{ label }}
  </label>

  <div class="relative">
    <!-- Icono (Opcional) -->
    <div *ngIf="icon" class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
      <span class="text-gray-400 material-icons text-sm">{{ icon }}</span>
    </div>

    <!-- Input -->
    <input
      [type]="type"
      [value]="value"
      [placeholder]="placeholder"
      (input)="updateValue($any($event.target).value)"
      (blur)="onTouched()"
      [ngClass]="{
        'border-red-500 focus:ring-red-200': error,
        'border-gray-300 focus:ring-blue-200 focus:border-blue-500': !error,
        'pl-10': icon
      }"
      class="w-full px-3 py-2 border rounded-lg shadow-sm outline-none transition-all focus:ring-4"
    />
  </div>

  <!-- Mensaje de Error -->
  <span *ngIf="error" class="text-xs text-red-500 font-medium">
    {{ error }}
  </span>
</div>
