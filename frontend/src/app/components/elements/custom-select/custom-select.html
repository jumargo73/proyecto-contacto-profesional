<div class="flex flex-col gap-1.5 w-full">
  <!-- Label -->
  <label *ngIf="label" class="text-sm font-medium text-gray-700">
    {{ label }}
  </label>

  <div class="relative">
    <select
      [value]="value"
      (change)="updateValue($event)"
      (blur)="onTouched()"
      [ngClass]="{
        'border-red-500 focus:ring-red-200': error,
        'border-gray-300 focus:ring-blue-200 focus:border-blue-500': !error
      }"
      class="w-full px-3 py-2.5 bg-white border rounded-lg shadow-sm outline-none appearance-none transition-all focus:ring-4 cursor-pointer text-gray-700"
    >
      <!-- Opción por defecto (placeholder) -->
      <option value="" disabled selected>{{ placeholder }}</option>
      
      <!-- Opciones dinámicas -->
      <option *ngFor="let opt of options" [value]="opt.value">
        {{ opt.label }}
      </option>
    </select>

    <!-- Flechita personalizada (Icono) -->
    <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-400">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
      </svg>
    </div>
  </div>

  <!-- Error -->
  <span *ngIf="error" class="text-xs text-red-500 font-medium">
    {{ error }}
  </span>
</div>
