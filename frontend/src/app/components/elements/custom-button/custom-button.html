<button
  [type]="type"
  [disabled]="disabled || isLoading"
  (click)="onClick()"
  [ngClass]="{
    'bg-blue-600 text-white hover:bg-blue-700 focus:ring-blue-200': variant === 'primary',
    'bg-red-600 text-white hover:bg-red-700 focus:ring-red-200': variant === 'danger',
    'border-2 border-gray-300 text-gray-700 hover:bg-gray-50 focus:ring-gray-100': variant === 'outline',
    'opacity-50 cursor-not-allowed': disabled || isLoading
  }"
  class="flex items-center justify-center gap-2 px-5 py-2.5 rounded-lg font-medium transition-all active:scale-95 focus:ring-4 outline-none"
>
  <!-- Spinner de carga -->
  <svg *ngIf="isLoading" class="animate-spin h-5 w-5 text-current" viewBox="0 0 24 24">
    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
  </svg>

  <!-- Icono (si no está cargando) -->
  <span *ngIf="icon && !isLoading" class="material-icons text-lg">{{ icon }}</span>

  <!-- Texto del botón -->
  <span>
    <ng-content></ng-content>
  </span>
</button>
